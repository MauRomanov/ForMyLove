<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The continuity of us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            background-color: #fffafb;
            color: #2d3436;
        }

        /* --- Fundo Cartoon Valentine --- */
        .bg-valentine-world {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #fffafb;
            overflow: hidden;
        }

        .doodle-heart {
            position: absolute;
            opacity: 0.25;
            pointer-events: none;
            fill: #e11d48;
            animation: float-doodle 15s infinite ease-in-out;
        }

        @keyframes float-doodle {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-30px) rotate(10deg) scale(1.1); }
        }

        .cartoon-blob {
            position: absolute;
            background: #ffe4e6;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(40px);
            opacity: 0.4;
            z-index: -1;
        }

        body.intro-active { overflow: hidden; }

        /* --- Presente Liquid Glass (Intro) Melhorado --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 2s cubic-bezier(0.23, 1, 0.32, 1), visibility 2s;
        }

        .gift-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            perspective: 1500px;
            animation: float-gift 4s ease-in-out infinite;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .gift-wrapper:hover {
            transform: scale(1.05) translateY(-10px);
        }

        @keyframes float-gift {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .gift-lid {
            position: absolute;
            top: -15px;
            width: 340px;
            height: 70px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.3) 100%);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-bottom: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            z-index: 2002;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08), inset 0 2px 5px rgba(255, 255, 255, 0.9);
            transition: all 3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift-bow {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 50px;
            z-index: 2004;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .bow-center {
            position: absolute;
            bottom: -5px;
            width: 28px;
            height: 28px;
            background: rgba(6, 182, 212, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 3;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.6), 0 4px 10px rgba(6, 182, 212, 0.3);
        }
        .bow-left, .bow-right {
            position: absolute;
            bottom: 2px;
            width: 65px;
            height: 45px;
            background: rgba(6, 182, 212, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.5), 0 5px 15px rgba(6, 182, 212, 0.2);
        }
        .bow-left {
            left: 10px;
            border-radius: 50px 10px 10px 50px;
            transform: rotate(-15deg);
            transform-origin: bottom right;
        }
        .bow-right {
            right: 10px;
            border-radius: 10px 50px 50px 10px;
            transform: rotate(15deg);
            transform-origin: bottom left;
        }

        .gift-box {
            position: relative;
            top: 20px;
            width: 310px;
            height: 260px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 0 0 16px 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 2.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .ribbon-v, .ribbon-h {
            position: absolute;
            background: linear-gradient(to right, rgba(6, 182, 212, 0.3), rgba(6, 182, 212, 0.5));
            backdrop-filter: blur(8px);
            border-left: 1px solid rgba(255,255,255,0.6);
            border-right: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
            z-index: 2001;
        }
        .ribbon-v { left: 50%; top: 0; bottom: 0; width: 48px; transform: translateX(-50%); }
        .ribbon-h { top: 50%; left: 0; right: 0; height: 48px; transform: translateY(-50%); border: none; border-top: 1px solid rgba(255,255,255,0.6); border-bottom: 1px solid rgba(255,255,255,0.6); background: linear-gradient(to bottom, rgba(6, 182, 212, 0.3), rgba(6, 182, 212, 0.5)); }

        .gift-tag {
            position: absolute;
            top: 50px;
            right: -35px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 8px;
            transform: rotate(12deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1), inset 0 2px 5px rgba(255,255,255,0.8);
            z-index: 2005;
            font-weight: 600;
            font-size: 1.05rem;
            color: #0891b2;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            animation: swing-tag 4s ease-in-out infinite;
            transform-origin: top left;
        }
        .gift-tag::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 15px;
            width: 2px;
            height: 25px;
            background: #cbd5e1;
            transform: rotate(-25deg);
        }
        .gift-tag::after {
            content: '';
            position: absolute;
            top: -17px;
            left: 7px;
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
        }

        @keyframes swing-tag {
            0%, 100% { transform: rotate(12deg); }
            50% { transform: rotate(18deg); }
        }

        .click-hint { position: absolute; bottom: -50px; font-size: 0.85rem; color: #0891b2; font-weight: 600; text-transform: lowercase; letter-spacing: 0.15em; opacity: 0.6; animation: pulse-hint 3s infinite; background: rgba(255,255,255,0.5); padding: 8px 16px; border-radius: 20px; backdrop-filter: blur(5px); }
        @keyframes pulse-hint { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.05); } }
        
        .opened .gift-wrapper { animation: none; }
        .opened .gift-lid { transform: translateY(-400px) rotateX(45deg) rotateZ(15deg) scale(0.8); opacity: 0; }
        .opened .gift-box { transform: scale(0.85) translateY(50px); opacity: 0; }
        .opened #intro-overlay { opacity: 0; visibility: hidden; }

        /* --- Interface --- */
        .glass-header { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; height: 60px; z-index: 1000; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 100px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03); display: flex; align-items: center; justify-content: center; padding: 0 32px; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .header-logo { font-weight: 600; font-size: 1rem; letter-spacing: 0.15em; text-transform: lowercase; color: #0891b2; }

        .timeline-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto; padding: 160px 0 100px 0; z-index: 10; }
        
        .timeline-item:not(:last-child)::after { 
            content: ''; 
            position: absolute; 
            left: 50%; 
            width: 4px; 
            background: linear-gradient(to bottom, #06b6d4 50%, rgba(6, 182, 212, 0.2) 50%); 
            background-size: 100% 200%;
            background-position: bottom left;
            top: 32px; 
            bottom: -152px; 
            transform: translateX(-50%); 
            z-index: 5; 
            border-radius: 4px;
            transition: background-position 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .timeline-item.item-active:not(:last-child)::after {
            background-position: top left;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }

        .timeline-dot { 
            position: absolute; left: 50%; top: 20px; width: 24px; height: 24px; 
            background-color: #06b6d4; border: 4px solid white; border-radius: 50%; 
            transform: translateX(-50%); z-index: 10; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            box-shadow: 0 4px 10px rgba(6, 182, 212, 0.2);
        }
        .timeline-dot:hover { transform: translateX(-50%) scale(1.25); background-color: #22d3ee; }

        .item-active > .timeline-dot {
            background-color: #fff !important;
            border-color: #06b6d4 !important;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5) !important;
        }

        #item-fim.item-active > .timeline-dot {
            border-color: #f472b6 !important;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.5) !important;
        }

        .dot-animating { transform: translateX(-50%) scale(1.4) !important; }

        .timeline-content { width: 44%; padding: 0 25px; margin-top: 12px; position: relative; }
        .left { text-align: right; margin-right: 56%; }
        .right { text-align: left; margin-left: 56%; }

        .card { display: inline-block; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 1.25rem; padding: 1rem 1.5rem; cursor: pointer; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); width: 100%; max-width: 140px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); overflow: hidden; position: relative; }
        .card h3 { font-weight: 600; color: #2d3436; font-size: 0.95rem; transition: color 0.4s; position: relative; z-index: 5; }
        .description { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.7s ease; font-size: 0.935rem; line-height: 1.7; color: #636e72; position: relative; z-index: 5; }
        .item-active .card { max-width: 100%; border-color: rgba(6, 182, 212, 0.3); background: rgba(255, 255, 255, 0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.06); }
        .item-active .card h3 { color: #0891b2; margin-bottom: 0.8rem; }
        .item-active .description { max-height: 2000px; opacity: 1; }

        /* --- DETAILED ANIMATIONS CSS --- */
        
        /* M1: Book of Memories */
        #item-1.item-active .card {
            background: #fdf8f5 !important;
            border: 2px solid #8b5cf6 !important;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2) !important;
        }
        #item-1.item-active h3 { color: #6d28d9 !important; font-family: 'Georgia', serif; }

        .memory-book-container { width: 100%; height: 140px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; position: relative; perspective: 1000px; }
        
        .book { position: relative; width: 60px; height: 80px; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1); transform: rotateX(60deg) rotateZ(-20deg); z-index: 5; }
        .item-active .book { transform: rotateX(20deg) rotateZ(0deg); }
        
        .book-cover, .book-page, .book-back { position: absolute; width: 100%; height: 100%; transform-origin: left; border-radius: 2px 6px 6px 2px; }
        .book-cover { background: #78350f; border: 2px solid #451a03; box-shadow: inset 4px 0 10px rgba(0,0,0,0.3); z-index: 5; transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s; display: flex; align-items: center; justify-content: center; }
        .book-cover::after { content: '♥'; color: #fbbf24; font-size: 1.5rem; }
        .book-page { background: #fef3c7; border: 1px solid #d4d4d8; z-index: 4; transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s; }
        .book-page-2 { background: #fde68a; z-index: 3; transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s; }
        .book-back { background: #451a03; z-index: 1; transform: translateZ(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .item-active .book-cover { transform: rotateY(-140deg); }
        .item-active .book-page { transform: rotateY(-130deg); }
        .item-active .book-page-2 { transform: rotateY(-120deg); }

        .memory-photo { position: absolute; bottom: 30px; left: 50%; margin-left: -14px; width: 28px; height: 32px; background: #fff; border: 2px solid #fff; border-bottom: 8px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2); opacity: 0; z-index: 2; border-radius: 2px; }
        .item-active .mem-1 { animation: memory-float 3.5s infinite ease-in-out 1.5s; }
        .item-active .mem-2 { animation: memory-float-2 4s infinite ease-in-out 2s; }

        @keyframes memory-float {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-30px, -70px) scale(1.2) rotate(-25deg); opacity: 0; }
        }
        @keyframes memory-float-2 {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(30px, -60px) scale(1.1) rotate(20deg); opacity: 0; }
        }

        /* M2: Pearl Necklace & Valentine's Dinner */
        #item-2.item-active .card {
            background: linear-gradient(135deg, #4c0519, #881337) !important;
            border: 2px solid #fbbf24 !important;
            box-shadow: 0 10px 30px rgba(136, 19, 55, 0.4) !important;
        }
        #item-2.item-active h3 { color: #fde68a !important; font-family: 'Georgia', serif; font-style: italic; }
        #item-2.item-active .description p { color: #fecdd3 !important; }
        #item-2.item-active .photo-space { background: rgba(255,255,255,0.1); border-color: #fbbf24; color: #fde68a; }

        .valentine-dinner-container { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; position: relative; }

        .dinner-candle { position: absolute; bottom: 30px; left: 25%; width: 14px; height: 40px; background: #fef08a; border-radius: 6px 6px 0 0; box-shadow: inset -4px 0 0 rgba(0,0,0,0.1); opacity: 0; transition: opacity 1s 0.5s; z-index: 2; }
        .dinner-flame { position: absolute; top: -14px; left: 1px; width: 12px; height: 16px; background: #facc15; border-radius: 50% 0 50% 50%; transform: rotate(-45deg); animation: dinner-flame-flicker 0.8s infinite alternate; box-shadow: 0 0 10px #facc15, 0 0 20px #f59e0b; }
        @keyframes dinner-flame-flicker { 0% { transform: rotate(-45deg) scale(0.9); } 100% { transform: rotate(-45deg) scale(1.1); } }
        .item-active .dinner-candle { opacity: 1; }

        .jewelry-box { position: absolute; bottom: 20px; right: 25%; width: 50px; height: 15px; background: #1e1b4b; border-radius: 4px; box-shadow: 0 5px 10px rgba(0,0,0,0.3); opacity: 0; transform: translateY(20px); transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1) 1s; z-index: 3; }
        .jewelry-lid { position: absolute; bottom: 100%; left: 0; width: 50px; height: 40px; background: #312e81; border-radius: 4px 4px 0 0; transform-origin: bottom left; transform: rotate(0deg); transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 2s; border-top: 1px solid #4f46e5; border-left: 1px solid #4f46e5; }
        .item-active .jewelry-box { opacity: 1; transform: translateY(0); }
        .item-active .jewelry-lid { transform: rotate(-100deg); }

        .the-pearl { position: absolute; top: -12px; left: 20px; width: 12px; height: 12px; background: radial-gradient(circle at 35% 35%, #ffffff 0%, #fef08a 40%, #d97706 100%); border-radius: 50%; box-shadow: 0 0 10px rgba(253, 230, 138, 0.8); opacity: 0; transition: opacity 1s 2.5s; }
        .item-active .the-pearl { opacity: 1; animation: pearl-shine 2s infinite alternate 3s; }
        @keyframes pearl-shine { 0% { box-shadow: 0 0 5px rgba(253, 230, 138, 0.5); } 100% { box-shadow: 0 0 15px rgba(255, 255, 255, 1); } }
        
        .necklace-string { position: absolute; width: 36px; height: 18px; border: 1.5px solid transparent; border-bottom-color: #fcd34d; border-radius: 50%; top: -18px; left: 7px; opacity: 0; transition: opacity 1s 2.5s; }
        .item-active .necklace-string { opacity: 1; }

        .dinner-heart { position: absolute; bottom: 40px; right: 30%; width: 18px; height: 18px; fill: #fb7185; opacity: 0; z-index: 5; }
        .item-active .dinner-heart { animation: dinner-heart-float 4s infinite ease-in-out 3.5s; }
        @keyframes dinner-heart-float { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-60px) scale(1.2) rotate(15deg); opacity: 0; } }

        /* M3: Jigsaw Puzzle */
        #item-3.item-active .card {
            background: #fdf4ff !important;
            border: 2px solid #d946ef !important;
            box-shadow: 0 10px 30px rgba(217, 70, 239, 0.2) !important;
        }
        #item-3.item-active h3 { color: #a21caf !important; }
        
        .jigsaw-container { width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 1rem; }
        
        .puzzle-piece { transform-origin: center; transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .piece-left { transform: translateX(-40px) rotate(-15deg); opacity: 0; }
        .piece-right { transform: translateX(40px) rotate(15deg); opacity: 0; }
        
        .item-active .piece-left { animation: snap-left 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.5s; }
        .item-active .piece-right { animation: snap-right 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.5s; }
        
        @keyframes snap-left {
            0% { transform: translateX(-40px) rotate(-15deg); opacity: 0; }
            60% { transform: translateX(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateX(0px) rotate(0deg); opacity: 1; }
        }
        @keyframes snap-right {
            0% { transform: translateX(40px) rotate(15deg); opacity: 0; }
            60% { transform: translateX(10px) rotate(0deg); opacity: 1; }
            100% { transform: translateX(0px) rotate(0deg); opacity: 1; }
        }
        
        .sparkle-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 0; height: 0; }
        .snap-sparkle { position: absolute; width: 6px; height: 6px; background: #facc15; border-radius: 50%; opacity: 0; }
        .item-active .sparkle-1 { animation: pop-sparkle 0.5s ease-out 1.9s; }
        .item-active .sparkle-2 { animation: pop-sparkle 0.5s ease-out 1.9s; }
        .item-active .sparkle-3 { animation: pop-sparkle 0.5s ease-out 1.9s; }
        
        @keyframes pop-sparkle {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }

        /* M4: Building & Flowers */
        #item-4.item-active .card {
            background: linear-gradient(to bottom, #e0e7ff, #f3f4f6) !important;
            border: 2px solid #10b981 !important;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2) !important;
        }
        #item-4.item-active h3 { color: #047857 !important; }
        
        .city-nature-container { width: 100%; height: 140px; display: flex; justify-content: center; position: relative; overflow: hidden; border-radius: 8px; border-bottom: 2px solid #9ca3af; }
        
        .building { position: absolute; bottom: 0; background: #9ca3af; border-radius: 4px 4px 0 0; display: flex; flex-wrap: wrap; align-content: flex-start; padding: 6px; gap: 6px; box-shadow: inset -4px 0 0 rgba(0,0,0,0.1); }
        .bldg-1 { width: 45px; height: 100px; left: 15%; background: #6b7280; }
        .bldg-2 { width: 55px; height: 120px; left: 40%; background: #4b5563; }
        .bldg-3 { width: 40px; height: 80px; right: 15%; background: #9ca3af; }
        
        .window { width: 10px; height: 14px; background: #1f2937; border-radius: 2px; }
        .win-lit { background: #fef08a; box-shadow: 0 0 5px #facc15; }
        .item-active .win-lit { animation: window-flicker 4s infinite alternate; }
        
        @keyframes window-flicker { 0%, 80%, 90%, 100% { opacity: 1; } 85%, 95% { opacity: 0.4; } }
        
        .vine { position: absolute; width: 4px; background: #10b981; bottom: 0; border-radius: 2px; transform-origin: bottom; opacity: 0; }
        .item-active .vine-1 { height: 70px; left: 20%; animation: grow-vine 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.5s; }
        .item-active .vine-2 { height: 100px; left: 55%; animation: grow-vine 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.8s; }
        .item-active .vine-3 { height: 60px; right: 25%; animation: grow-vine 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.1s; }
        
        @keyframes grow-vine { 0% { transform: scaleY(0); opacity: 0; } 100% { transform: scaleY(1); opacity: 1; } }

            else if (num === '7') title.innerText = isActive ? 'Pizzaria de Amores' : 'Momento 7';
            else if (num === '8') title.innerText = isActive ? 'O Mundo Invertido' : 'Momento 8';
            else if (num === '9') title.innerText = isActive ? 'Praia à Vista' : 'Momento 9';
            else if (num === '10') title.innerText = isActive ? 'Mundo VR e Experimentos' : 'Momento 10';
            else if (num === '11') title.innerText = isActive ? 'Cuidando da Minha Princesa' : 'Momento 11';
            else if (num === '12') title.innerText = isActive ? 'MASP e Chuvarada' : 'Momento 12';
            else if (num === 'fim') title.innerText = isActive ? 'Para o Futuro!' : 'Fim';

            dot.classList.remove('dot-animating');
            void dot.offsetWidth;
            dot.classList.add('dot-animating');
            setTimeout(() => { dot.classList.remove('dot-animating'); }, 800);
        }
    </script>
</body>
</html>
