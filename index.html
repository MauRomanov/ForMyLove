<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The continuity of us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            background-color: #fffafb;
            color: #2d3436;
        }

        /* --- Fundo Cartoon Valentine --- */
        .bg-valentine-world {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #fffafb;
            overflow: hidden;
        }

        /* Doodle Hearts - Agora mais avermelhados/rosados */
        .doodle-heart {
            position: absolute;
            opacity: 0.25; /* Aumentado ligeiramente para destacar a cor */
            pointer-events: none;
            fill: #e11d48; /* Rose 600 - Mais intenso */
            animation: float-doodle 15s infinite ease-in-out;
        }

        @keyframes float-doodle {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-30px) rotate(10deg) scale(1.1); }
        }

        .cartoon-blob {
            position: absolute;
            background: #ffe4e6;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(40px);
            opacity: 0.4;
            z-index: -1;
        }

        body.intro-active { overflow: hidden; }

        /* --- Presente Liquid Glass (Intro) --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 2s cubic-bezier(0.23, 1, 0.32, 1), visibility 2s;
        }

        .gift-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            perspective: 1500px;
        }

        .gift-lid {
            position: absolute;
            top: -15px;
            width: 320px;
            height: 65px;
            background: rgba(255, 255, 255, 0.35); /* Mais transparente */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            z-index: 2002;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: all 4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift-box {
            position: relative;
            width: 300px;
            height: 250px;
            background: rgba(255, 255, 255, 0.2); /* Mais transparente */
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 0 0 12px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .ribbon-v {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 44px;
            background: rgba(6, 182, 212, 0.3);
            backdrop-filter: blur(5px);
            transform: translateX(-50%);
            border-left: 1px solid rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .ribbon-h {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 44px;
            background: rgba(6, 182, 212, 0.3);
            backdrop-filter: blur(5px);
            transform: translateY(-50%);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .gift-logo {
            position: relative;
            z-index: 2005;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: lowercase;
            letter-spacing: 0.15em;
            color: #0891b2;
            text-align: center;
            padding: 0 20px;
        }

        .click-hint {
            position: absolute;
            bottom: -60px;
            font-size: 0.8rem;
            color: #0891b2;
            text-transform: lowercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .opened .gift-lid { transform: translateY(-500px) rotateX(60deg) scale(0.7); opacity: 0; }
        .opened .gift-box { transform: scale(0.95); opacity: 0; }
        .opened #intro-overlay { opacity: 0; visibility: hidden; }

        /* --- Interface Principal --- */
        .glass-header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            height: 60px;
            z-index: 1000;
            /* Header muito mais transparente e com mais blur */
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 100px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 32px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .header-logo {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.15em;
            text-transform: lowercase;
            color: #0891b2;
        }

        .timeline-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 160px 0 100px 0;
            z-index: 10;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 50%;
            width: 3.5px;
            background-color: #06b6d4;
            top: 32px; 
            bottom: -152px; 
            transform: translateX(-50%);
            z-index: 5;
        }

        .timeline-dot {
            position: absolute;
            left: 50%;
            top: 20px; 
            width: 24px;
            height: 24px;
            background-color: #06b6d4;
            border: 4px solid white;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 10;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 10px rgba(6, 182, 212, 0.2);
        }

        .timeline-dot:hover {
            transform: translateX(-50%) scale(1.3);
        }

        .timeline-content {
            width: 44%;
            padding: 0 25px;
            margin-top: 12px;
        }

        .left { text-align: right; margin-right: 56%; }
        .right { text-align: left; margin-left: 56%; }

        /* Cartões muito mais transparentes e glassier */
        .card {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2); /* Reduzida a opacidade */
            backdrop-filter: blur(20px); /* Aumentado o blur para o efeito frost */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1.25rem;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            width: 100%;
            max-width: 140px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .card h3 {
            font-weight: 600;
            color: #2d3436;
            font-size: 0.95rem;
        }

        .description {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.7s ease;
            font-size: 0.935rem;
            line-height: 1.7;
            color: #636e72;
        }

        .item-active .card {
            max-width: 100%;
            border-color: rgba(6, 182, 212, 0.3);
            background: rgba(255, 255, 255, 0.45); /* Mantém transparência mesmo ativo */
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
        }

        .item-active .card h3 { color: #0891b2; margin-bottom: 0.8rem; }
        .item-active .description { max-height: 1000px; opacity: 1; }

        .photo-space {
            width: 100%;
            height: 220px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px dashed rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b2bec3;
            font-size: 0.75rem;
            text-transform: lowercase;
            letter-spacing: 0.1em;
        }

        @media (max-width: 640px) {
            .timeline-item:not(:last-child)::after { left: 30px; bottom: -152px; width: 3.5px; }
            .timeline-dot { left: 30px; }
            .timeline-content {
                width: 82%;
                margin-left: 65px !important;
                margin-right: 0 !important;
                text-align: left !important;
            }
            .glass-header { height: 55px; }
        }
    </style>
</head>
<body class="intro-active">

    <!-- Fundo Cartoon Valentine -->
    <div class="bg-valentine-world">
        <!-- Cartoon Blobs -->
        <div class="cartoon-blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
        <div class="cartoon-blob" style="width: 500px; height: 500px; bottom: -150px; right: -150px; background: #fee2e2;"></div>
        
        <!-- Doodle Hearts - Cores Rose-Red -->
        <svg class="doodle-heart" style="top: 15%; left: 10%; width: 40px; height: 40px;" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="doodle-heart" style="top: 70%; left: 15%; width: 30px; height: 30px; animation-delay: 2s;" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="doodle-heart" style="top: 20%; right: 15%; width: 35px; height: 35px; animation-delay: 5s;" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="doodle-heart" style="bottom: 10%; right: 10%; width: 45px; height: 45px; animation-delay: 1s;" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>

    <!-- Intro: Presente de Vidro -->
    <div id="intro-overlay" onclick="openGift()">
        <div class="gift-wrapper">
            <div class="gift-lid">
                <div class="ribbon-v"></div>
            </div>
            <div class="gift-box">
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
                <div class="gift-logo">the continuity of us</div>
            </div>
            <div class="click-hint">para o nosso sempre</div>
        </div>
    </div>

    <!-- Header Fixo -->
    <header class="glass-header">
        <div class="header-logo">the continuity of us</div>
    </header>

    <div class="timeline-container" id="timeline">
        <!-- Gerado via Script -->
    </div>

    <script>
        function openGift() {
            document.body.classList.add('opened');
            setTimeout(() => { document.body.classList.remove('intro-active'); }, 2200);
        }

        const timelineContainer = document.getElementById('timeline');
        for (let i = 1; i <= 20; i++) {
            const side = i % 2 !== 0 ? 'left' : 'right';
            const itemHtml = `
                <div class="timeline-item flex relative mb-[120px]" id="item-${i}">
                    <div class="timeline-dot" onclick="toggleItem('item-${i}')"></div>
                    <div class="timeline-content ${side}">
                        <div class="card" onclick="toggleItem('item-${i}')">
                            <h3>Momento ${i}</h3>
                            <div class="description">
                                <p>Este é um capítulo precioso da nossa história. A nossa continuidade se constrói em cada detalhe guardado com amor.</p>
                                <div class="photo-space">
                                    nossa foto aqui
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            timelineContainer.insertAdjacentHTML('beforeend', itemHtml);
        }

        function toggleItem(id) {
            document.getElementById(id).classList.toggle('item-active');
        }
    </script>
</body>
</html>
